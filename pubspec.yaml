name: portfolio_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  timeline_tile: ^2.0.0
  timelines: ^0.1.0
  font_awesome_flutter: ^10.8.0
  flutter_avif: ^3.0.0
  velocity_x: ^4.3.1
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/dev.png

  fonts:
    - family: custome
      fonts:
        - asset: assets/Poppins-Regular.ttf
        - asset: assets/Poppins-Light.ttf
          weight: 400
        - asset: assets/Poppins-Medium.ttf
          weight: 600
        - asset: assets/Poppins-SemiBold.ttf
          weight: 700
        - asset: assets/Poppins-Bold.ttf
          weight: 800
        - asset: assets/Poppins-Bold.ttf
          weight: 900